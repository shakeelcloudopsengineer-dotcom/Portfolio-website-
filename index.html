<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shakeel | Cloud Engineer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      max-width: 600px;
    }

    .badge {
      background: #ff9900;
      color: #000;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
    }

    h1 { font-size: 42px; margin-bottom: 10px; }

    .title {
      font-size: 18px;
      color: #a8d8ea;
      margin-bottom: 30px;
    }

    .skills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 30px;
    }

    .skill {
      background: rgba(255,153,0,0.2);
      border: 1px solid #ff9900;
      color: #ff9900;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
    }

    .hosted {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">☁️ AWS Cloud Engineer</div>
    <h1>Mohamed Shakeel</h1>
    <p class="title">Cloud Engineer · DevOps · HCLTech</p>

    <div class="skills">
      <span class="skill">AWS</span>
      <span class="skill">S3</span>
      <span class="skill">CloudFront</span>
      <span class="skill">EC2</span>
      <span class="skill">Docker</span>
      <span class="skill">CI/CD</span>
      <span class="skill">Terraform</span>
    </div>

    <p>Building scalable cloud infrastructure.<br>
    SAA-C03 Certified · 3 AWS Projects</p>

    <p class="hosted">
      ⚡ Hosted on AWS S3 + CloudFront | HTTPS Enabled
    </p>
  </div>
</body>
</html>
